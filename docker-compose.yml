version: '3.8'

services:
  ange-draw:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ange-draw
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    volumes:
      # Map the SQLite database to the host machine to persist data
      # Make sure to touch the file locally if it doesn't exist, e.g. `touch ./server/excalidraw.db`
      - ./server/excalidraw.db:/app/server/excalidraw.db
    restart: unless-stopped
